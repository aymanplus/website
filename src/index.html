<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة المطعم</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fff7ed; /* orange-50 */
            color: #111827; /* gray-900 */
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- الحاوية التي سيتم عرض التطبيق بداخلها -->
    <div id="app"></div>

    <!-- كود التطبيق (Preact + HTM بديل React للمتصفحات) -->
    <script type="module">
        import { html, render, useState } from 'https://unpkg.com/htm/preact/standalone.module.js';

        // --- إعدادات المطعم ---
        const RESTAURANT_NAME = "مطعم الشيف الذهبي";
        const WHATSAPP_NUMBER = "966509312930";

        // --- البيانات ---
        const categories = [
            { id: 'all', name: 'الكل', icon: 'utensils' },
            { id: 'burgers', name: 'البرجر', icon: 'sandwich' },
            { id: 'pizza', name: 'البيتزا', icon: 'pizza' },
            { id: 'shawarma', name: 'الشاورما', icon: 'flame' },
            { id: 'drinks', name: 'المشروبات', icon: 'coffee' }
        ];

        const menuItems = [
            { id: 'b1', categoryId: 'burgers', name: 'كلاسيك برجر', description: 'شريحة لحم بقري مشوي مع جبنة الشيدر، الخس، الطماطم وصلصتنا الخاصة', price: 35, calories: 650, image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500&q=80' },
            { id: 'b2', categoryId: 'burgers', name: 'دبل تشيز برجر', description: 'شريحتين من اللحم المشوي مع طبقتين من جبنة الشيدر الذائبة', price: 45, calories: 920, image: 'https://images.unsplash.com/photo-1586816001966-79b736744398?auto=format&fit=crop&w=500&q=80' },
            { id: 'p1', categoryId: 'pizza', name: 'بيتزا مارجريتا', description: 'صلصة الطماطم الكلاسيكية مع جبنة الموزاريلا الطازجة والريحان', price: 40, calories: 800, image: 'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?auto=format&fit=crop&w=500&q=80' },
            { id: 'p2', categoryId: 'pizza', name: 'بيتزا بيبروني', description: 'مغطاة بصلصة الطماطم الغنية، جبنة الموزاريلا وشرائح البيبروني', price: 48, calories: 950, image: 'https://images.unsplash.com/photo-1628840042765-356cda07504e?auto=format&fit=crop&w=500&q=80' },
            { id: 's1', categoryId: 'shawarma', name: 'شاورما دجاج صاروخ', description: 'دجاج متبل مشوي يقدم في خبز الصاج مع الثومية والمخلل', price: 20, calories: 450, image: './chicken_shawarma.png' },
            { id: 's2', categoryId: 'shawarma', name: 'وجبة عربي لحم', description: 'شاورما لحم مقطعة مع البطاطس، الطحينة والخضروات الجانبية', price: 32, calories: 780, image: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=500&q=80' },
            { id: 's3', categoryId: 'shawarma', name: 'شاورما دجاج ميني', description: 'شاورما دجاج صغيرة مناسبة للأطفال', price: 10, calories: 250 },
            { id: 'd1', categoryId: 'drinks', name: 'موهيتو فراولة', description: 'موهيتو منعش مع قطع الفراولة الطازجة، النعناع والليمون', price: 18, calories: 120, image: 'https://images.unsplash.com/photo-1544145945-f90425340c7e?auto=format&fit=crop&w=500&q=80' },
            { id: 'd2', categoryId: 'drinks', name: 'عصير برتقال طازج', description: 'عصير برتقال معصور طبيعياً 100٪ بدون سكر مضاف', price: 15, calories: 110, image: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=500&q=80' },
            { id: 'd3', categoryId: 'drinks', name: 'شاي كرك', description: 'شاي كرك بالهيل والزعفران محضر على الطريقة التقليدية', price: 5, calories: 150 }
        ];

        // --- الأيقونات ---
        const icons = {
            utensils: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>`,
            sandwich: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M3 11v3a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1v-3"/><path d="M12 19H4a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1h-3.83"/><path d="m3 11 2.77-7.39a2 2 0 0 1 1.87-1.3l12.18 2.22a2 2 0 0 1 1.54 2.82L19 11"/></svg>`,
            pizza: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M15 11h.01"/><path d="M11 15h.01"/><path d="M16 16h.01"/><path d="m2 16 20 6-6-20A20 20 0 0 0 2 16"/><path d="M5.71 17.11a17.04 17.04 0 0 1 11.4-11.4"/></svg>`,
            flame: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`,
            coffee: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M10 2v2"/><path d="M14 2v2"/><path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1"/><path d="M6 2v2"/></svg>`,
            cart: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>`,
            plus: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M5 12h14"/><path d="M12 5v14"/></svg>`,
            minus: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M5 12h14"/></svg>`,
            trash: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>`,
            x: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`,
            whatsapp: html`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`
        };

        const getIcon = (name) => icons[name] || icons.utensils;

        // --- المكون الرئيسي للتطبيق ---
        const App = () => {
            const [activeCategory, setActiveCategory] = useState('all');
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [cart, setCart] = useState({});

            const filteredItems = activeCategory === 'all' 
                ? menuItems 
                : menuItems.filter(item => item.categoryId === activeCategory);

            const addToCart = (id) => {
                setCart(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 }));
            };

            const removeFromCart = (id) => {
                setCart(prev => {
                    const next = { ...prev };
                    if (next[id] > 1) {
                        next[id]--;
                    } else {
                        delete next[id];
                    }
                    return next;
                });
            };

            const removeAllFromCart = (id) => {
                setCart(prev => {
                    const next = { ...prev };
                    delete next[id];
                    return next;
                });
            };

            const cartItemsCount = Object.values(cart).reduce((a, b) => a + b, 0);
            
            const cartTotal = Object.entries(cart).reduce((total, [id, quantity]) => {
                const item = menuItems.find(i => i.id === id);
                return total + (item ? item.price * quantity : 0);
            }, 0);

            const sendOrderViaWhatsApp = () => {
                if (Object.keys(cart).length === 0) return;
                
                let message = `مرحباً ${RESTAURANT_NAME}، أود طلب الآتي:\n\n`;
                message += `*تفاصيل الطلب:*\n`;
                message += `------------------------\n`;
                
                Object.entries(cart).forEach(([id, quantity]) => {
                    const item = menuItems.find(i => i.id === id);
                    if (item) {
                        message += `- *${quantity}x ${item.name}*\n`;
                        if (quantity > 1) {
                            message += `   (السعر: ${item.price} ر.س | الإجمالي: ${item.price * quantity} ر.س)\n`;
                        } else {
                            message += `   (الإجمالي: ${item.price} ر.س)\n`;
                        }
                    }
                });
                
                message += `------------------------\n\n`;
                message += `*الإجمالي النهائي:* *${cartTotal} ر.س*\n\n`;
                message += `*ملاحظات إضافية:* \n(أضف هنا)\n\n`;
                message += `الرجاء تأكيد استلام الطلب.\nشكراً لكم!`;
                
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
            };

            return html`
                <div>
                    <!-- Header -->
                    <header class="sticky top-0 z-30 bg-white border-b-4 border-orange-400">
                        <div class="max-w-5xl mx-auto px-4 h-20 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center text-white shadow-md">
                                    <div class="w-6 h-6">${icons.utensils}</div>
                                </div>
                                <h1 class="font-black text-2xl text-orange-600 tracking-tight">${RESTAURANT_NAME}</h1>
                            </div>
                            
                            <button onClick=${() => setIsCartOpen(true)} class="relative p-3 bg-orange-100 text-orange-600 rounded-full hover:bg-orange-200 transition-colors">
                                <div class="w-6 h-6">${icons.cart}</div>
                                ${cartItemsCount > 0 && html`
                                    <div class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs font-bold flex items-center justify-center rounded-full border-2 border-white shadow-sm pointer-events-none">
                                        ${cartItemsCount}
                                    </div>
                                `}
                            </button>
                        </div>
                    </header>

                    <!-- Categories -->
                    <div class="bg-white/90 backdrop-blur-md sticky top-20 z-20 border-b-2 border-orange-100">
                        <div class="max-w-5xl mx-auto px-4">
                            <div class="flex overflow-x-auto gap-3 py-4 hide-scrollbar">
                                ${categories.map(category => html`
                                    <button
                                        key=${category.id}
                                        onClick=${() => setActiveCategory(category.id)}
                                        class="flex gap-2 items-center whitespace-nowrap px-4 py-2 rounded-full font-bold transition-all ${
                                            activeCategory === category.id
                                                ? 'bg-orange-100 text-orange-700 border-2 border-orange-200'
                                                : 'hover:bg-orange-100 text-gray-600 border-2 border-transparent'
                                        }"
                                    >
                                        <div class="w-4 h-4">${getIcon(category.icon)}</div>
                                        ${category.name}
                                    </button>
                                `)}
                            </div>
                        </div>
                    </div>

                    <!-- Menu Grid -->
                    <main class="max-w-5xl mx-auto px-4 py-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${filteredItems.map(item => html`
                                <div key=${item.id} class="bg-white rounded-3xl p-4 shadow-lg border-2 border-orange-100 transform transition-transform hover:scale-[1.02] flex flex-col h-full">
                                    ${item.image ? html`
                                        <div class="relative aspect-[4/3] overflow-hidden bg-orange-50 rounded-2xl flex-shrink-0 mb-4">
                                            <img src=${item.image} alt=${item.name} class="w-full h-full object-cover" loading="lazy" />
                                            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur text-green-600 px-2 py-1 rounded-lg text-xs font-bold shadow-sm flex items-center gap-1 border border-green-100">
                                                <div class="w-3.5 h-3.5">${icons.flame}</div>
                                                ${item.calories} سعرة
                                            </div>
                                        </div>
                                    ` : html`
                                        <div class="flex justify-between items-center mb-4 mt-1">
                                            <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-400 shadow-sm border border-orange-100">
                                                <div class="w-6 h-6">${getIcon(item.categoryId)}</div>
                                            </div>
                                            <div class="bg-green-50 text-green-600 px-2 py-1 rounded-lg text-xs font-bold shadow-sm flex items-center gap-1 border border-green-100">
                                                <div class="w-3.5 h-3.5">${icons.flame}</div>
                                                ${item.calories} سعرة
                                            </div>
                                        </div>
                                    `}
                                    
                                    <div class="flex flex-col flex-grow">
                                        <div class="flex justify-between items-start gap-4 mb-2">
                                            <h3 class="font-black text-lg text-gray-900 leading-tight">${item.name}</h3>
                                            <span class="font-black text-orange-500 text-xl whitespace-nowrap">
                                                ${item.price} <span class="text-sm">ر.س</span>
                                            </span>
                                        </div>
                                        
                                        <p class="text-gray-500 text-sm mb-6 flex-grow leading-relaxed font-medium">
                                            ${item.description}
                                        </p>
                                        
                                        <div class="mt-auto">
                                            ${cart[item.id] ? html`
                                                <div class="flex items-center justify-between bg-orange-50 p-1.5 rounded-2xl border border-orange-200">
                                                    <button onClick=${() => removeFromCart(item.id)} class="w-10 h-10 flex items-center justify-center bg-white rounded-xl text-orange-600 shadow-sm hover:bg-orange-100 transition-colors font-bold">
                                                        <div class="w-5 h-5">${cart[item.id] === 1 ? icons.trash : icons.minus}</div>
                                                    </button>
                                                    <span class="font-black text-lg min-w-[2rem] text-center text-orange-700">${cart[item.id]}</span>
                                                    <button onClick=${() => addToCart(item.id)} class="w-10 h-10 flex items-center justify-center bg-orange-500 rounded-xl text-white shadow-md hover:bg-orange-600 transition-colors">
                                                        <div class="w-5 h-5">${icons.plus}</div>
                                                    </button>
                                                </div>
                                            ` : html`
                                                <button onClick=${() => addToCart(item.id)} class="w-full bg-orange-500 text-white font-bold py-3 rounded-2xl shadow-md hover:bg-orange-600 active:scale-95 transition-all flex items-center justify-center gap-2">
                                                    <div class="w-5 h-5">${icons.plus}</div>
                                                    إضافة للطلب
                                                </button>
                                            `}
                                        </div>
                                    </div>
                                </div>
                            `)}
                        </div>
                    </main>

                    <!-- Cart Drawer -->
                    ${isCartOpen && html`
                        <div class="fixed inset-0 z-40">
                            <!-- Overlay -->
                            <div class="absolute inset-0 bg-black/50" onClick=${() => setIsCartOpen(false)}></div>
                            
                            <!-- Drawer -->
                            <div class="absolute inset-y-0 right-0 w-full max-w-sm bg-white shadow-[-10px_0_30px_rgba(0,0,0,0.05)] flex flex-col z-50">
                                <div class="p-6 border-b-2 border-gray-100 flex items-center justify-between bg-white">
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 bg-orange-100 text-orange-600 flex items-center justify-center rounded-xl">
                                            <div class="w-6 h-6">${icons.cart}</div>
                                        </div>
                                        <h2 class="font-black text-xl">سلة الطلبات</h2>
                                    </div>
                                    <button onClick=${() => setIsCartOpen(false)} class="p-2 text-gray-400 hover:text-gray-600 bg-gray-50 rounded-full transition-colors font-bold">
                                        <div class="w-5 h-5">${icons.x}</div>
                                    </button>
                                </div>

                                <div class="flex-1 overflow-y-auto p-6">
                                    ${Object.keys(cart).length === 0 ? html`
                                        <div class="h-full flex flex-col items-center justify-center text-gray-400 gap-4">
                                            <div class="w-16 h-16 text-gray-200">${icons.cart}</div>
                                            <p class="text-lg font-bold">السلة فارغة حالياً</p>
                                        </div>
                                    ` : html`
                                        <div class="space-y-4">
                                            ${Object.entries(cart).map(([id, quantity]) => {
                                                const item = menuItems.find(i => i.id === id);
                                                if (!item) return null;
                                                
                                                return html`
                                                    <div key=${id} class="flex gap-4 p-3 bg-white rounded-2xl shadow-sm border-2 border-orange-50 group hover:border-orange-100 transition-colors">
                                                        <img src=${item.image} alt=${item.name} class="w-20 h-20 object-cover rounded-xl shadow-sm bg-orange-50" />
                                                        <div class="flex-1 flex flex-col justify-between">
                                                            <div>
                                                                <div class="flex justify-between items-start">
                                                                    <h4 class="font-black text-gray-900 leading-tight">${item.name}</h4>
                                                                    <button onClick=${() => removeAllFromCart(id)} class="text-gray-400 hover:text-red-500 transition-colors">
                                                                        <div class="w-4 h-4">${icons.x}</div>
                                                                    </button>
                                                                </div>
                                                                <div class="text-orange-500 font-black mt-1">
                                                                    ${item.price * quantity} ر.س
                                                                </div>
                                                            </div>
                                                            
                                                            <div class="flex items-center gap-3 mt-2">
                                                                <button onClick=${() => removeFromCart(id)} class="w-7 h-7 flex items-center justify-center bg-orange-50 border border-orange-100 rounded-lg shadow-sm text-orange-600 hover:text-red-500 font-bold">
                                                                    <div class="w-3.5 h-3.5">${quantity === 1 ? icons.trash : icons.minus}</div>
                                                                </button>
                                                                <span class="font-black text-sm w-4 text-center">${quantity}</span>
                                                                <button onClick=${() => addToCart(id)} class="w-7 h-7 flex items-center justify-center bg-orange-50 border border-orange-100 rounded-lg shadow-sm text-orange-600 hover:bg-orange-100 font-bold">
                                                                    <div class="w-3.5 h-3.5">${icons.plus}</div>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                `;
                                            })}
                                        </div>
                                    `}
                                </div>

                                ${Object.keys(cart).length > 0 && html`
                                    <div class="p-6 bg-white border-t-2 border-gray-100">
                                        <div class="flex justify-between items-center mb-6">
                                            <span class="font-black text-xl text-gray-900">الإجمالي</span>
                                            <span class="font-black text-2xl text-orange-600">${cartTotal} ر.س</span>
                                        </div>
                                        
                                        <button onClick=${sendOrderViaWhatsApp} class="w-full bg-green-500 text-white font-black text-lg py-4 rounded-2xl shadow-lg shadow-green-200 active:scale-95 transition-transform flex items-center justify-center gap-3">
                                            <div class="w-6 h-6">${icons.whatsapp}</div>
                                            إرسال الطلب عبر الواتساب
                                        </button>
                                        <p class="text-center text-xs text-gray-400 mt-3 font-bold">
                                            سيتم تحويلك إلى تطبيق واتساب لإتمام طلبك
                                        </p>
                                    </div>
                                `}
                            </div>
                        </div>
                    `}
                </div>
            `;
        };

        // تشغيل التطبيق في الحاوية
        render(html`<${App} />`, document.getElementById('app'));
    </script>
</body>
</html>
